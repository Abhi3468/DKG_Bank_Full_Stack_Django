<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | DKG Bank</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'UserInterface/css/style.css' %}?v=3.0">

</head>
<body style="justify-content: center; align-items: center;">
    <div class="auth-card" style="margin: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="/" class="logo" style="color: var(--bank-primary);">DKG BANK</a>
            <h2 style="margin-top: 1rem;">Reset Password</h2>
            <p style="color: var(--text-light); font-size: 0.9rem;">Enter your registered email address.</p>
        </div>

        <form id="forgotForm">
            {% csrf_token %}
            <div id="errorMsg" class="alert alert-error" style="display: none;"></div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@email.com">
            </div>
            <button type="submit" class="btn-primary">Send OTP</button>
            <div class="auth-switch">
                Remembered it? <a href="{% url 'index' %}">Sign In</a>
            </div>
        </form>
    </div>
    <script src="{% static 'UserInterface/js/forgot_password.js' %}" defer></script>
</body>
</html>
