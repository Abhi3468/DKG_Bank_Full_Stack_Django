# DKG_ATM/docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: atm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: atm_db
      POSTGRES_USER: atm_user
      POSTGRES_PASSWORD: atm_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atm_user -d atm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atm_network
    restart: unless-stopped

  web:
    build: .
    container_name: atm_web
    # REMOVED: migrate from command (run separately via `docker compose run web migrate`)
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 DKG_ATM.wsgi:application"
    # REMOVED: volumes: - .:/app (breaks production - use for dev only)
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: "django-insecure-docker-key-change-in-production"
      DATABASE_URL: "postgres://atm_user:atm_password@db:5432/atm_db"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web,0.0.0.0"
      # ADD: Render-specific env vars for local testing
      RENDER_EXTERNAL_HOSTNAME: "localhost"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - atm_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: atm_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - atm_network
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:

networks:
  atm_network:
    driver: bridge