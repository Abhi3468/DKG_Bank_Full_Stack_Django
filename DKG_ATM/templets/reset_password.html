<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password | DKG Bank</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'UserInterface/css/style.css' %}?v=3.0">
</head>

<body style="justify-content: center; align-items: center;">
    <div class="auth-card" style="margin: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="/" class="logo" style="color: var(--bank-primary);">DKG BANK</a>
            <h2 style="margin-top: 1rem;">Set New Password</h2>
            <p style="color: var(--text-light); font-size: 0.9rem;">Choose a strong password for your account.</p>
        </div>

        <form id="resetForm">
            {% csrf_token %}
            <div id="errorMsg" class="alert alert-error" style="display: none;"></div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Reset Password</button>
        </form>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (password !== confirm) {
                const err = document.getElementById('errorMsg');
                err.textContent = "Passwords do not match.";
                err.style.display = 'block';
                return;
            }

            fetch("{% url 'reset_password' %}", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded", "X-CSRFToken": "{{ csrf_token }}" },
                body: "password=" + encodeURIComponent(password)
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert("Password reset successful! Please login.");
                        window.location.href = "{% url 'index' %}";
                    } else {
                        const err = document.getElementById('errorMsg');
                        err.textContent = data.message;
                        err.style.display = 'block';
                    }
                });
        });
    </script>
</body>

</html>
