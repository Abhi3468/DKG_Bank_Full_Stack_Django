<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password | DKG Bank</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'UserInterface/css/style.css' %}?v=3.0">

</head>

<body style="justify-content: center; align-items: center;">
    <div class="auth-card" style="margin: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="/" class="logo" style="color: var(--bank-primary);">DKG BANK</a>
            <h2 style="margin-top: 1rem;">Set New Password</h2>
            <p style="color: var(--text-light); font-size: 0.9rem;">Choose a strong password for your account.</p>
        </div>

        <form id="resetForm">
            {% csrf_token %}
            <div id="errorMsg" class="alert alert-error" style="display: none;"></div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Reset Password</button>
        </form>
    </div>

    <script src="{% static 'UserInterface/js/reset_password.js' %}" defer></script>
</body>

</html>
