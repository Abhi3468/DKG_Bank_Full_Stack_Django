<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | DKG Bank</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'UserInterface/css/style.css' %}?v=3.0">
    <script src="{% static 'UserInterface/js/verify_otp.js' %}"></script>
</head>
<body style="justify-content: center; align-items: center;">
    <div class="auth-card" style="margin: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="/" class="logo" style="color: var(--bank-primary);">DKG BANK</a>
            <h2 style="margin-top: 1rem;">Verify OTP</h2>
            <p style="color: var(--text-light); font-size: 0.9rem;">Enter the 6-digit code sent to your email.</p>
        </div>

        <form id="otpForm">
            {% csrf_token %}
            <div id="errorMsg" class="alert alert-error" style="display: none;"></div>
            <div class="form-group">
                <label>Verification Code</label>
                <input type="text" id="otp" maxlength="6" required placeholder="000000" style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem;">
            </div>
            <button type="submit" class="btn-primary">Verify Code</button>
        </form>
    </div>

</body>
</html>
